name: R-CMD-check

on:
  push:
  pull_request:

jobs:
  R-CMD-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install system dependencies
        run: |
          brew install imagemagick
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, any::lintr
          needs: check
      - name: Check
        run: |
          R -q -e "devtools::check(document = FALSE, args = c('--no-manual'))"
      - name: Lint
        run: R -q -e "lintr::lint_dir()"
